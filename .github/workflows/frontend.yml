name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20.x'
  DIST_DIR: 'frontend/dist/todo-app/browser'
  DEPLOY_PATH: 'C:\inetpub\wwwroot\todo-app'   # Ruta del sitio IIS en Windows
  IIS_SITE_NAME: 'todo-app'                      # Nombre del sitio en IIS

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: BUILD & TEST
  # Runner: ubuntu-latest (GitHub-hosted, gratuito)
  # Trigger: siempre — en push, PR o tag
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint || echo "Lint completado con advertencias"
        continue-on-error: true

      - name: Run unit tests (ChromeHeadless)
        working-directory: frontend
        run: npm test

      - name: Build production bundle
        working-directory: frontend
        run: npm run build:prod

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ${{ env.DIST_DIR }}
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: RELEASE — Crea el GitHub Release con el .zip adjunto
  # Runner: ubuntu-latest (GitHub-hosted)
  # Trigger: solo al hacer push de un tag  v*.*.*
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./release-files

      - name: Compress artifact (.zip)
        run: zip -r frontend-${{ github.ref_name }}.zip ./release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Frontend ${{ github.ref_name }}"
          body: |
            ## Frontend Angular — ${{ github.ref_name }}

            Bundle Angular 17 compilado para producción.

            ### Requisitos del servidor
            - Windows con **IIS** habilitado
            - Módulo **URL Rewrite** de IIS instalado
            - Sitio IIS `todo-app` apuntando a `C:\inetpub\wwwroot\todo-app`

            ### Instalación manual
            ```powershell
            Expand-Archive frontend-${{ github.ref_name }}.zip -DestinationPath C:\inetpub\wwwroot\todo-app -Force
            Restart-WebSite todo-app
            ```
          files: frontend-${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: DEPLOY — Despliega en Windows usando el self-hosted runner local
  # Runner: self-hosted Windows (tu PC o servidor Windows)
  # Trigger: solo al hacer push de un tag  v*.*.*
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Windows IIS
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, windows]
    environment:
      name: production
      url: http://localhost/todo-app
    defaults:
      run:
        shell: pwsh   # PowerShell Core en todos los pasos de este job

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: .\deploy-files

      - name: Crear directorio del sitio IIS
        run: |
          if (-not (Test-Path "${{ env.DEPLOY_PATH }}")) {
            New-Item -ItemType Directory -Path "${{ env.DEPLOY_PATH }}" -Force | Out-Null
            Write-Host "Directorio creado: ${{ env.DEPLOY_PATH }}"
          }

      - name: Limpiar contenido anterior
        run: |
          $items = Get-ChildItem -Path "${{ env.DEPLOY_PATH }}" -ErrorAction SilentlyContinue
          if ($items) {
            Remove-Item -Path "${{ env.DEPLOY_PATH }}\*" -Recurse -Force
            Write-Host "Contenido anterior eliminado."
          }

      - name: Copiar nuevos archivos al sitio IIS
        run: |
          Copy-Item -Path ".\deploy-files\*" `
                    -Destination "${{ env.DEPLOY_PATH }}" `
                    -Recurse -Force
          Write-Host "Frontend desplegado en: ${{ env.DEPLOY_PATH }}"
          Write-Host "Archivos desplegados:"
          Get-ChildItem "${{ env.DEPLOY_PATH }}" | Select-Object Name

      - name: Crear sitio IIS (solo la primera vez)
        run: |
          Import-Module WebAdministration -ErrorAction SilentlyContinue
          $site = Get-Website -Name "${{ env.IIS_SITE_NAME }}" -ErrorAction SilentlyContinue
          if (-not $site) {
            Write-Host "Creando sitio IIS '${{ env.IIS_SITE_NAME }}'..."
            New-Website -Name "${{ env.IIS_SITE_NAME }}" `
                        -Port 80 `
                        -PhysicalPath "${{ env.DEPLOY_PATH }}" `
                        -Force
            Write-Host "Sitio IIS creado."
          } else {
            Write-Host "Sitio IIS '${{ env.IIS_SITE_NAME }}' ya existe."
          }

      - name: Reiniciar/iniciar el sitio IIS
        run: |
          Import-Module WebAdministration
          $site = Get-Website -Name "${{ env.IIS_SITE_NAME }}"
          if ($site.State -eq 'Started') {
            Restart-WebSite -Name "${{ env.IIS_SITE_NAME }}"
            Write-Host "Sitio IIS reiniciado."
          } else {
            Start-Website -Name "${{ env.IIS_SITE_NAME }}"
            Write-Host "Sitio IIS iniciado."
          }

      - name: Health check — verificar que el frontend carga
        run: |
          Start-Sleep -Seconds 3
          try {
            $response = Invoke-WebRequest `
              -Uri "http://localhost/todo-app" `
              -UseBasicParsing `
              -TimeoutSec 10
            Write-Host "Health check OK — Status: $($response.StatusCode)"
          } catch {
            Write-Warning "Health check: $_ (verifica que el sitio IIS este configurado)"
          }

      - name: Limpiar workspace
        if: always()
        run: |
          if (Test-Path ".\deploy-files") {
            Remove-Item -Recurse -Force ".\deploy-files"
            Write-Host "Workspace limpiado."
          }
